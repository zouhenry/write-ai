<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>WriteAI - AI-Powered Grammar Checking</title>
    <meta
      name="description"
      content="Get instant grammar and spelling suggestions with WriteAI's AI-powered writing assistant."
    />
    <link rel="icon" type="image/png" href="/favicon.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#6c63ff" />
    <link rel="stylesheet" href="static/style.css" />
    <link
      rel="stylesheet"
      href="https://cdn.jsdelivr.net/npm/katex/dist/katex.min.css"
    />
    <script src="https://cdn.jsdelivr.net/npm/dompurify/dist/purify.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/katex/dist/katex.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked-katex-extension/lib/index.umd.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', function () {
        if (window.marked) {
          window.marked.use({ breaks: true });
          if (window.markedKatex) {
            window.marked.use(window.markedKatex({ throwOnError: false }));
          }
        }
      });
    </script>
  </head>
  <body class="dark-mode">
    <div id="app"></div>
    <script type="module" src="static/main.js"></script>
  </body>
</html>
