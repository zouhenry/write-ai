services:
  grammar-llm:
    build: .
    ports:
      - "8000:8000"
    volumes:
      - grammar_llm_models:/root/.cache/huggingface/hub
      - ./writeai/static:/app/writeai/static
      - ./main.py:/app/main.py
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

volumes:
  grammar_llm_models:
