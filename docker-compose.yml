services:
  grammar-llm:
    build: .
    ports:
      - "8000:8000"
    environment:
      - MODEL_SIZE=sm  # sm (~2.4GB, default), md (~3.2GB), lg (~4.2GB)
      # - NO_GPU=1      # uncomment for CPU-only
      # - LLM_API_BASE=http://host:1234   # point to LM Studio or any OpenAI-compatible server
      # - LLM_MODEL_NAME=local-model      # model name reported by that server
    volumes:
      - ~/.cache/huggingface/hub:/root/.cache/huggingface/hub
      - ./writeai/static:/app/writeai/static
      - ./main.py:/app/main.py
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
