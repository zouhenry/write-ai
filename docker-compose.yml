services:
  grammar-llm:
    build: .
    ports:
      - "8000:8000"
    environment:
      - GEMMA_QUANT=sm  # sm (~2.4GB, default), md (~3.2GB), lg (~4.2GB)
      # - NO_GPU=1      # uncomment for CPU-only
      # - GEMMA_API_BASE=http://host:8080  # uncomment to use a remote llama.cpp server
    volumes:
      - ~/.cache/huggingface/hub:/root/.cache/huggingface/hub
      - ./writeai/static:/app/writeai/static
      - ./main.py:/app/main.py
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3
